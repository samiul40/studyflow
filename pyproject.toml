[tool.ruff]
line-length = 88
target-version = "py311"

exclude = [
    ".git",
    "__pycache__",
    "migrations",
    "venv"
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = [
    "accounts",
    "learning",
    "pages",
    "studyflow"
]

section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder"
]