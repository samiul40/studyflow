upstream django {
    server web:8000;
}

# Step 1 (initial cert acquisition): HTTP only — comment out the 443 block below,
# run: docker compose -f docker-compose-prod.yml run --rm certbot certonly
#        --webroot --webroot-path /var/www/certbot -d YOUR_DOMAIN -d www.YOUR_DOMAIN
# Step 2: uncomment the 443 block and replace YOUR_DOMAIN, then restart nginx.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Required for Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
