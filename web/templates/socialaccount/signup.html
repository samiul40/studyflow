{% extends 'base.html' %}

{% block content %}
<section class="login-section">
  <div class="login-card">

    <div class="login-header">
      <div class="login-brand">StudyFlow<span>.</span></div>
      <p class="login-subtitle">Complete sign in with Google</p>
    </div>

    <p class="text-muted small mb-4">
      You are signing in using your Google account
      <strong>{{ sociallogin.account.extra_data.email }}</strong>.
      Click continue to finish.
    </p>

    <form method="POST" action="{% url 'socialaccount_signup' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary w-100">Continue</button>
    </form>

    <div class="mt-3 text-center">
      <a href="{% url 'account_login' %}" class="text-muted small">Back to sign in</a>
    </div>

  </div>
</section>
{% endblock %}
