<div class="mb-4">
  <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
  {{ field }}
  {% if field.help_text %}
  <div class="form-text">{{ field.help_text }}</div>
  {% endif %}
  {% if field.errors %}
  <div class="field-error">
    <i class="fas fa-circle-exclamation me-1"></i>{{ field.errors }}
  </div>
  {% endif %}
</div>
