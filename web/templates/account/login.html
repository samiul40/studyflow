{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}
<section class="login-section">
  <div class="login-card">

    <div class="login-header">
      <div class="login-brand">StudyFlow<span>.</span></div>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger py-2" role="alert">
      {% for error in form.non_field_errors %}{{ error }}{% endfor %}
    </div>
    {% endif %}

    <form action="{% url 'account_login' %}" method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label" for="id_login">Username or email</label>
        <input type="text" name="login" id="id_login" class="form-control"
          placeholder="Enter your username or email" required autofocus>
      </div>

      <div class="mb-4">
        <label class="form-label" for="id_password">Password</label>
        <div class="input-group">
          <input type="password" name="password" id="password" class="form-control"
            placeholder="Enter your password" required>
          <span class="input-group-text login-toggle-pass" id="togglePass">
            <i class="fas fa-eye" id="togglePassword"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>

    <div class="my-3 text-center text-muted small">or</div>

    <a href="{% provider_login_url 'google' %}" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="18" height="18">
      Continue with Google
    </a>

    <div class="mt-3 d-flex justify-content-between">
      <a href="{% url 'account_signup' %}" class="text-muted small">Create an account</a>
      <a href="{% url 'account_reset_password' %}" class="text-muted small">Forgot password?</a>
    </div>

  </div>
</section>
{% endblock %}
