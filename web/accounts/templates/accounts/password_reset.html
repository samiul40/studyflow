{% extends 'base.html' %}

{% block content %}
<section class="login-section">
  <div class="login-card">

    <div class="login-header">
      <div class="login-brand">StudyFlow<span>.</span></div>
      <p class="login-subtitle">Reset your password</p>
    </div>

    <p class="text-muted small mb-4">
      Enter your email address and we'll send you a link to reset your password.
    </p>

    <form action="{% url 'password_reset' %}" method="POST">
      {% csrf_token %}

      <div class="mb-4">
        <label class="form-label" for="id_email">Email address</label>
        <input
          type="email"
          name="email"
          id="id_email"
          class="form-control"
          placeholder="Enter your email"
          required
          autofocus>
      </div>

      <button type="submit" class="btn btn-primary w-100">Send reset link</button>
    </form>

    <div class="mt-3 text-center">
      <a href="{% url 'login' %}" class="text-muted small">Back to sign in</a>
    </div>

  </div>
</section>
{% endblock %}
