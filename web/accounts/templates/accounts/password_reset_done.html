{% extends 'base.html' %}

{% block content %}
<section class="login-section">
  <div class="login-card">

    <div class="login-header">
      <div class="login-brand">StudyFlow<span>.</span></div>
      <p class="login-subtitle">Check your email</p>
    </div>

    <p class="text-muted small mb-4">
      If an account exists for that address, you'll receive a password reset link shortly.
      Check your spam folder if it doesn't arrive within a few minutes.
    </p>

    <a href="{% url 'login' %}" class="btn btn-primary w-100">Back to sign in</a>

  </div>
</section>
{% endblock %}
