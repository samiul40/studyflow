<div class="modal fade" id="editUnitModal{{ unit.id }}" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <form method="post" action="{% url 'learning:unit_update' resource.pk unit.pk %}">
        {% csrf_token %}

        <div class="modal-header">
          <h5 class="modal-title">Edit Learning Unit</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="text" name="title" value="{{ unit.title }}" class="form-control mb-3">

          <input type="number" name="duration_minutes" value="{{ unit.duration_minutes }}" class="form-control mb-3" placeholder="Duration (minutes)">

          <input type="hidden" name="order" value="{{ unit.order }}">

          <textarea name="notes" class="form-control">{{ unit.notes }}</textarea>

        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary" onclick="handleSubmit(this)">
            <span class="btn-text">Save</span>
            <span class="spinner-border spinner-border-sm d-none"></span>
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
