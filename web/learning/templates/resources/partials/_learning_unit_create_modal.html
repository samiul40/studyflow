<div class="modal fade" id="addUnitModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="post" action="{% url 'learning:unit_create' resource.pk %}">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-plus me-2"></i>Add Learning Unit</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" required autofocus>
          </div>
          {% if resource.resource_type.content_kind != "reading" %}
          <div class="mb-3">
            <label class="form-label">Duration</label>
            <div class="duration-picker">
              <div class="input-group">
                <input type="number" class="form-control dp-hours" min="0" placeholder="h">
                <span class="input-group-text">h</span>
                <input type="number" class="form-control dp-mins" min="0" max="59" placeholder="m">
                <span class="input-group-text">m</span>
              </div>
              <input type="hidden" name="duration_minutes">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Video Progress</label>
            <div class="duration-picker">
              <div class="input-group">
                <input type="number" class="form-control dp-hours" min="0" placeholder="h">
                <span class="input-group-text">h</span>
                <input type="number" class="form-control dp-mins" min="0" max="59" placeholder="m">
                <span class="input-group-text">m</span>
              </div>
              <input type="hidden" name="video_progress_minutes">
            </div>
          </div>
          {% endif %}
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" onclick="handleSubmit(this)">
            <span class="btn-text">Create Unit</span>
            <span class="spinner-border spinner-border-sm d-none"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
